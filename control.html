class AudioFeedback{#ctx=null;#getCtx(){if(!this.#ctx){const AC=globalThis.AudioContext??globalThis.webkitAudioContext;if(AC)this.#ctx=new AC}return this.#ctx}async play(){const c=this.#getCtx();if(!c)return;if(c.state==="suspended")await c.resume();const t=c.currentTime,osc=c.createOscillator(),gain=c.createGain();osc.type="sine";osc.frequency.setValueAtTime(880,t);osc.frequency.setValueAtTime(1320,t+.08);gain.gain.setValueAtTime(.07,t);gain.gain.exponentialRampToValueAtTime(.001,t+.18);osc.connect(gain).connect(c.destination);osc.start(t);osc.stop(t+.18)}}
const bridge=TelegramBridge.shared,productLookup=new ProductLookup,audio=new AudioFeedback;
Alpine.data("app",()=>({view:"app",loading:true,scanning:false,items:[],codes:new Set,counter:0,toast:{visible:false,message:"",type:"success"},_tt:null,currentUserId:null,
async init(){if(!tg){this.view="not-telegram";return}bridge.init();this.currentUserId=bridge.userId;if(ALLOWED_USER_IDS.length>0&&!ALLOWED_USER_IDS.includes(this.currentUserId)){this.view="no-access";return}this.view="app";await this.load();this.loading=false;this.setupButtons();this.$watch("items.length",()=>this.updateSecondaryButton())},
destroy(){if(this._tt)clearTimeout(this._tt)},
setupButtons(){if(!tg)return;tg.MainButton.setText("📷 Сканировать");tg.MainButton.setParams({color:"#30d158",text_color:"#ffffff"});tg.MainButton.show();tg.MainButton.onClick(()=>this.scan());if(tg.SecondaryButton){tg.SecondaryButton.setText("➕ Добавить");tg.SecondaryButton.setParams({color:"#1c1c1e",text_color:"#0a84ff",position:"bottom"});tg.SecondaryButton.show();tg.SecondaryButton.onClick(()=>this.promptAddCode())}this.updateSecondaryButton()},
updateSecondaryButton(){if(!tg?.SecondaryButton)return;tg.SecondaryButton.show()},
promptAddCode(){bridge.haptic("light");if(tg?.showPopup){tg.showPopup({title:"Добавить EAN-код",message:"Введите 8 или 13 цифр штрих-кода",buttons:[{id:"cancel",type:"cancel"},{id:"input",type:"default",text:"Ввести код"}]},id=>{if(id==="input")this.showNativePrompt()})}else this.showNativePrompt()},
showNativePrompt(){const input=globalThis.prompt("Введите EAN-код (8 или 13 цифр):");if(!input)return;const code=input.replace(/\D/g,"");if(!validateEAN(code)){this.showToast("Неверный EAN-код","error");bridge.notify("error");return}if(this.codes.has(code)){this.showToast(`${code} уже добавлен`,"warning");bridge.notify("warning");return}this.addItem(code);bridge.notify("success");audio.play();this.showToast("Код добавлен","success")},
scan(){if(this.scanning)return;this.scanning=true;bridge.haptic("light");if(!tg?.showScanQrPopup){this.showToast("QR-сканер недоступен","error");this.scanning=false;return}tg.showScanQrPopup({text:"Наведите на штрих-код"},result=>{if(!result){this.scanning=false;return true}return this.handleScanResult(result)})},
handleScanResult(result){const code=extractCode(result);if(!code){this.showToast("Неверный EAN-код","error");bridge.notify("error");tg?.closeScanQrPopup?.();this.scanning=false;return true}if(this.codes.has(code)){this.showToast(`${code} уже добавлен`,"warning");bridge.notify("warning");tg?.closeScanQrPopup?.();this.scanning=false;return true}this.addItem(code);bridge.notify("success");audio.play();this.showToast("Код добавлен","success");tg?.closeScanQrPopup?.();this.scanning=false;return true},
async addItem(code){this.counter+=1;const item={id:this.counter,code,ts:Date.now(),productName:null,productWeight:null};this.codes.add(code);this.items.unshift(item);this.save();const product=await productLookup.fetch(code);if(product){const target=this.items.find(i=>i.code===code);if(target){target.productName=product.name;target.productWeight=product.weight;this.save()}}},
renderBarcode(item){this.$nextTick(()=>{const el=document.getElementById(`bc-${item.id}`);if(!el)return;try{JsBarcode(el,item.code,{format:item.code.length===8?"ean8":"ean13",lineColor:"#1d1d1f",background:"transparent",width:2,height:56,displayValue:false,margin:4,flat:true})}catch{el.remove()}})},
async downloadBarcode(item){bridge.haptic("light");const canvas=document.createElement("canvas"),padding=40,bw=item.code.length===8?340:460,bh=160;canvas.width=bw+padding*2;canvas.height=bh+padding*2+60;const ctx=canvas.getContext("2d");ctx.fillStyle="#ffffff";ctx.beginPath();ctx.roundRect(0,0,canvas.width,canvas.height,24);ctx.fill();try{const tmpCanvas=document.createElement("canvas");JsBarcode(tmpCanvas,item.code,{format:item.code.length===8?"ean8":"ean13",lineColor:"#1d1d1f",background:"transparent",width:2,height:bh,displayValue:false,margin:0,flat:true});ctx.drawImage(tmpCanvas,padding,padding,bw,bh);ctx.fillStyle="#1d1d1f";ctx.font="600 28px 'SF Mono',Menlo,Monaco,monospace";ctx.textAlign="center";ctx.fillText(item.code,canvas.width/2,padding+bh+44);canvas.toBlob(blob=>{if(!blob){this.showToast("Ошибка создания","error");return}const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`barcode-${item.code}.png`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);this.showToast("Скачивание...","success");bridge.notify("success")},"image/png")}catch{this.showToast("Ошибка создания","error")}},
shareCode(item){bridge.haptic("light");const text=item.productName?`${item.code} — ${item.productName}${item.productWeight?` (${item.productWeight})`:""}`:item.code;if(!bridge.shareText(text))this.copyCode(text)},
async copyCode(code){bridge.haptic("light");try{await navigator.clipboard.writeText(code);this.showToast(`${code} скопирован`,"success");bridge.notify("success")}catch{this.showToast("Не удалось скопировать","error")}},
remove(id){bridge.haptic("medium");const item=this.items.find(i=>i.id===id);if(item)this.codes.delete(item.code);this.items=this.items.filter(i=>i.id!==id);this.save()},
showToast(message,type="success"){if(this._tt)clearTimeout(this._tt);this.toast={visible:true,message,type};this._tt=setTimeout(()=>{this.toast.visible=false;this._tt=null},TOAST_DURATION)},
async save(){const payload=JSON.stringify({items:this.items,counter:this.counter});await bridge.cloudSet(STORAGE_KEY,payload)},
async load(){const raw=await bridge.cloudGet(STORAGE_KEY);if(!raw)return;try{const data=JSON.parse(raw);if(!Array.isArray(data?.items))return;this.items=data.items;this.counter=data.counter??data.items.length;this.codes=new Set(data.items.map(i=>i.code));this.$nextTick(()=>requestAnimationFrame(()=>{for(const item of this.items)this.renderBarcode(item)}));for(const item of this.items){if(item.productName)continue;const product=await productLookup.fetch(item.code);if(product){item.productName=product.name;item.productWeight=product.weight}}this.save()}catch{this.showToast("Ошибка загрузки","error")}}}));
Alpine.start();
</script>
