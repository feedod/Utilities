<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"
        />
        <meta name="color-scheme" content="dark" />
        <script type="importmap">
            {
                "imports": {
                    "@tma.js/sdk": "https://cdn.jsdelivr.net/npm/@tma.js/sdk@2.1.0/+esm",
                    "alpinejs": "https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/+esm",
                    "jsbarcode": "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/+esm"
                }
            }
        </script>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style type="text/tailwindcss">
            @theme {
                --color-bg: #000000;
                --color-surface: #1c1c1e;
                --color-surface-elevated: #2c2c2e;
                --color-surface-tertiary: #3a3a3c;
                --color-border: #38383a;
                --color-text: #ffffff;
                --color-text-secondary: #ebebf5;
                --color-muted: #8e8e93;
                --color-success: #30d158;
                --color-error: #ff453a;
                --color-warning: #ff9f0a;
                --color-accent: #0a84ff;
                --color-tint: #64d2ff;
            }

            * {
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                box-sizing: border-box;
            }

            html,
            body {
                background: var(--color-bg);
                font-family:
                    -apple-system, BlinkMacSystemFont, "SF Pro Display",
                    "SF Pro Text", system-ui, sans-serif;
                overscroll-behavior: none;
                -webkit-font-smoothing: antialiased;
                scrollbar-width: none;
                margin: 0;
                padding: 0;
            }

            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: calc(env(safe-area-inset-bottom) + 100px);
            }

            [x-cloak] {
                display: none !important;
            }

            .glass {
                background: rgba(28, 28, 30, 0.85);
                backdrop-filter: blur(20px) saturate(180%);
                -webkit-backdrop-filter: blur(20px) saturate(180%);
            }

            .sticky-header {
                position: sticky;
                top: 0;
                z-index: 40;
                padding-top: calc(env(safe-area-inset-top) + 8px);
            }

            .product-card {
                background: var(--color-surface);
                border: 0.5px solid rgba(255, 255, 255, 0.08);
                border-radius: 16px;
                overflow: hidden;
                animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)
                    forwards;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .barcode-container svg {
                width: 100% !important;
                height: auto !important;
                max-height: 80px;
            }
        </style>
    </head>
    <body
        x-cloak
        x-data="ScannerApp"
        class="flex min-h-dvh flex-col bg-bg text-text antialiased"
    >
        <header class="sticky-header glass px-5 pb-4 text-center">
            <h1 class="text-2xl font-bold tracking-tight text-text">Control</h1>
            <p
                class="text-xs font-medium text-muted uppercase tracking-widest mt-0.5"
            >
                Barcode Scanner Pro
            </p>
        </header>

        <main class="mx-auto w-full max-w-lg flex-1 px-4 py-6">
            <template x-if="scannedItems.length === 0">
                <div class="flex flex-col items-center py-12">
                    <div
                        class="mb-6 w-full rounded-2xl border border-border bg-surface p-8 text-center shadow-sm"
                    >
                        <div
                            class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-surface-elevated"
                        >
                            <svg
                                class="h-8 w-8 text-muted"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="1.5"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z"
                                />
                            </svg>
                        </div>
                        <p class="text-base font-semibold text-text">
                            Готов к работе
                        </p>
                        <p class="mt-1 text-sm text-muted">
                            Нажмите кнопку сканирования ниже
                        </p>
                    </div>
                </div>
            </template>

            <template x-if="scannedItems.length > 0">
                <div class="space-y-4">
                    <div class="flex items-center justify-between px-1">
                        <h2
                            class="text-xs font-bold text-muted uppercase tracking-wider"
                        >
                            История сканирования
                        </h2>
                        <span
                            class="text-xs font-bold bg-surface-tertiary px-2 py-0.5 rounded-full text-text"
                            x-text="scannedItems.length"
                        ></span>
                    </div>
                    <div class="space-y-3">
                        <template x-for="item in scannedItems" :key="item.id">
                            <div
                                class="product-card"
                                x-init="$nextTick(() => renderBarcode(item))"
                            >
                                <div
                                    class="flex items-center justify-between p-4"
                                >
                                    <div class="flex-1 min-w-0">
                                        <p
                                            class="font-mono text-lg font-bold tracking-wider text-text truncate"
                                            x-text="item.code"
                                            @click="copyCode(item.code)"
                                        ></p>
                                        <p
                                            class="text-[10px] text-muted uppercase mt-0.5"
                                            x-text="new Date(item.timestamp).toLocaleTimeString()"
                                        ></p>
                                    </div>
                                    <button
                                        @click="removeItem(item.id)"
                                        class="ml-4 flex h-10 w-10 items-center justify-center rounded-xl bg-surface-elevated active:scale-95 transition-transform"
                                    >
                                        <svg
                                            class="h-5 w-5 text-error"
                                            fill="none"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            viewBox="0 0 24 24"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M6 18L18 6M6 6l12 12"
                                            />
                                        </svg>
                                    </button>
                                </div>
                                <div
                                    class="bg-white p-3 border-t border-border/10"
                                >
                                    <div
                                        class="barcode-container flex items-center justify-center"
                                    >
                                        <svg :id="'bar_' + item.id"></svg>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </main>

        <div
            x-show="toast.visible"
            x-transition
            class="glass fixed bottom-28 left-1/2 -translate-x-1/2 z-50 rounded-2xl px-6 py-3 shadow-2xl border border-white/10"
        >
            <div class="flex items-center gap-3">
                <div
                    :class="{'text-success': toast.type === 'success', 'text-error': toast.type === 'error', 'text-warning': toast.type === 'warning'}"
                >
                    <template x-if="toast.type === 'success'"
                        ><svg
                            class="w-5 h-5"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="3"
                            viewBox="0 0 24 24"
                        >
                            <path d="M5 13l4 4L19 7" /></svg
                    ></template>
                    <template x-if="toast.type !== 'success'"
                        ><svg
                            class="w-5 h-5"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="3"
                            viewBox="0 0 24 24"
                        >
                            <path
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                            /></svg
                    ></template>
                </div>
                <span
                    class="text-sm font-bold text-white whitespace-nowrap"
                    x-text="toast.message"
                ></span>
            </div>
        </div>

        <script type="module">
            import {
                init,
                hapticFeedback,
                qrScanner,
                mainButton,
                secondaryButton,
                cloudStorage,
                closingBehavior,
            } from "@tma.js/sdk";
            import Alpine from "alpinejs";
            import JsBarcode from "jsbarcode";

            const TMA = {
                async setup() {
                    try {
                        init();
                        hapticFeedback.mount();
                        qrScanner.mount();
                        mainButton.mount();
                        secondaryButton.mount();
                        cloudStorage.mount();
                        closingBehavior.mount();
                        closingBehavior.enableConfirmation();
                    } catch (e) {
                        console.error("TMA Init Error:", e);
                    }
                },
            };

            const AudioManager = {
                ctx: null,
                playSuccess() {
                    try {
                        const AC =
                            globalThis.AudioContext ||
                            globalThis.webkitAudioContext;
                        if (!AC) return;
                        if (!this.ctx) this.ctx = new AC();
                        if (this.ctx.state === "suspended") this.ctx.resume();
                        const t = this.ctx.currentTime,
                            osc = this.ctx.createOscillator(),
                            g = this.ctx.createGain();
                        osc.type = "sine";
                        osc.frequency.setValueAtTime(880, t);
                        osc.frequency.setValueAtTime(1320, t + 0.08);
                        g.gain.setValueAtTime(0.1, t);
                        g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                        osc.connect(g);
                        g.connect(this.ctx.destination);
                        osc.start(t);
                        osc.stop(t + 0.2);
                    } catch {}
                },
            };

            document.addEventListener("alpine:init", () => {
                Alpine.data("ScannerApp", () => ({
                    scannedItems: [],
                    scannedCodes: new Set(),
                    toast: { visible: false, message: "", type: "success" },
                    idCounter: 0,

                    async init() {
                        await TMA.setup();
                        await this.loadHistory();
                        this.updateButtons();
                    },

                    updateButtons() {
                        if (!mainButton.isMounted()) return;

                        mainButton.setParams({
                            isVisible: true,
                            isEnabled: true,
                            text: "СКАНЕР",
                            backgroundColor: "#30d158",
                            textColor: "#ffffff",
                        });

                        const onClick = () => this.scan();
                        mainButton.offClick(onClick);
                        mainButton.onClick(onClick);

                        if (this.scannedItems.length > 0) {
                            secondaryButton.setParams({
                                isVisible: true,
                                isEnabled: true,
                                text: "ОЧИСТИТЬ",
                                backgroundColor: "#1c1c1e",
                                textColor: "#ff453a",
                            });
                            const onClear = () => this.confirmClear();
                            secondaryButton.offClick(onClear);
                            secondaryButton.onClick(onClear);
                        } else {
                            secondaryButton.hide();
                        }
                    },

                    async scan() {
                        hapticFeedback.impactOccurred("light");
                        try {
                            const result = await qrScanner.open({
                                text: "Наведите на штрихкод",
                            });
                            if (!result) return;

                            const code = this.validateCode(result);
                            if (!code) {
                                this.showToast("Неверный формат", "error");
                                return;
                            }
                            if (this.scannedCodes.has(code)) {
                                this.showToast("Уже в списке", "warning");
                                return;
                            }

                            const item = {
                                id: ++this.idCounter,
                                code,
                                timestamp: Date.now(),
                            };
                            this.scannedItems.unshift(item);
                            this.scannedCodes.add(code);
                            this.saveHistory();

                            hapticFeedback.notificationOccurred("success");
                            AudioManager.playSuccess();
                            this.updateButtons();
                        } catch (e) {
                            console.error("Scan Error:", e);
                        }
                    },

                    validateCode(val) {
                        if (!val) return null;
                        const clean = val
                            .toString()
                            .trim()
                            .replace(/[^\d]/g, "");
                        return clean.length >= 8 && clean.length <= 14
                            ? clean
                            : null;
                    },

                    renderBarcode(item) {
                        const el = document.getElementById(`bar_${item.id}`);
                        if (!el) return;
                        try {
                            JsBarcode(el, item.code, {
                                format:
                                    item.code.length === 8 ? "EAN8" : "EAN13",
                                lineColor: "#000",
                                width: 2,
                                height: 60,
                                displayValue: false,
                                margin: 10,
                            });
                        } catch {
                            el.parentElement.innerHTML =
                                '<span class="text-xs text-muted">Ошибка штрихкода</span>';
                        }
                    },

                    async copyCode(code) {
                        try {
                            await navigator.clipboard.writeText(code);
                            this.showToast("Скопировано", "success");
                            hapticFeedback.impactOccurred("medium");
                        } catch {}
                    },

                    removeItem(id) {
                        const idx = this.scannedItems.findIndex(
                            (i) => i.id === id,
                        );
                        if (idx > -1) {
                            this.scannedCodes.delete(
                                this.scannedItems[idx].code,
                            );
                            this.scannedItems.splice(idx, 1);
                            this.saveHistory();
                            this.updateButtons();
                        }
                    },

                    confirmClear() {
                        if (confirm("Удалить всё?")) {
                            this.scannedItems = [];
                            this.scannedCodes.clear();
                            this.saveHistory();
                            this.updateButtons();
                            this.showToast("Очищено", "success");
                        }
                    },

                    showToast(msg, type = "success") {
                        this.toast = { visible: true, message: msg, type };
                        setTimeout(() => (this.toast.visible = false), 2500);
                    },

                    async saveHistory() {
                        const data = JSON.stringify(this.scannedItems);
                        localStorage.setItem("scanner_history", data);
                        if (cloudStorage.isMounted()) {
                            cloudStorage
                                .setItem("history", data)
                                .catch(() => {});
                        }
                    },

                    async loadHistory() {
                        const local = localStorage.getItem("scanner_history");
                        if (local) {
                            this.scannedItems = JSON.parse(local);
                            this.scannedItems.forEach((i) =>
                                this.scannedCodes.add(i.code),
                            );
                            this.idCounter = Math.max(
                                0,
                                ...this.scannedItems.map((i) => i.id),
                            );
                        }
                    },
                }));
            });
            Alpine.start();
        </script>
    </body>
</html>
